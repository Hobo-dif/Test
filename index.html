<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
html,body{
margin:0;
padding:0;
background:black;
height:100%;
overflow:hidden;
}

iframe{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
border:0;
}
</style>
</head>

<body>

<iframe
src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=0&controls=0&rel=0&loop=1&playlist=dQw4w9WgXcQ&modestbranding=1&playsinline=1"
allow="autoplay; fullscreen"
allowfullscreen>
</iframe>

<script>
// Attempt to raise volume if browser allows
setTimeout(()=>{
  const vid=document.querySelector("iframe");
  vid.contentWindow?.postMessage(
    '{"event":"command","func":"setVolume","args":[100]}',
    "*"
  );
},2000);
</script>

</body>
</html>
